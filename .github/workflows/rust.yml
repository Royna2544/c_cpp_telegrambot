name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo registry and target dirs
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          src/api/builtin_modules/builder/builder-rs
          src/rust/stringcalc
    - name: Install protoc
      run: |
        sudo apt update
        sudo apt-get install -y protobuf-compiler
    - name: Build builder-rs
      run: cd src/api/builtin_modules/builder/builder-rs; cargo build --verbose
    - name: Test builder-rs
      run: cd src/api/builtin_modules/builder/builder-rs; cargo test --verbose
    - name: Build and test stringcalc
      run: cd src/rust/stringcalc; cargo build --verbose && cargo test --verbose
