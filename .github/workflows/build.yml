name: Build Glider (Multi-Platform)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # upload vcpkg binaries to the GitHub Packages NuGet cache

jobs:
  build:
    name: 🚧 ${{ matrix.os }} ${{ matrix.cc }} ${{ matrix.str }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux Builds ---
          - os: ubuntu-latest
            cc: GCC
            real_cc: gcc
            real_cxx: g++
            flags: -DTGBOTCPP_RUST_MODULES=ON
            str: (Rust)
          - os: ubuntu-latest
            cc: GCC
            real_cc: gcc
            real_cxx: g++
            flags: '-DBUILD_SHARED_LIBS=ON'
            str: (Shared)
          - os: ubuntu-latest
            cc: Clang
            real_cc: clang
            real_cxx: clang++
            flags: -DTGBOTCPP_RUST_MODULES=ON -DBUILD_SHARED_LIBS=ON
            str: (Rust, Shared)
          - os: ubuntu-latest
            cc: Clang
            real_cc: clang
            real_cxx: clang++
            flags: ''
          
          # --- macOS Build ---
          - os: macos-latest
            cc: AppleClang
            real_cc: clang
            real_cxx: clang++
            flags: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
          - os: macos-latest
            cc: AppleClang
            real_cc: clang
            real_cxx: clang++
            flags: -DBUILD_SHARED_LIBS=ON -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
            str: (Shared)

          # --- Windows Build ---
          - os: windows-latest
            cc: MSVC
            real_cc: cl.exe
            real_cxx: cl.exe
            flags: ''

    env:
      # Two layers: a fast per-runner files cache (actions/cache, but evicts at
      # the 10 GB/7-day limit) plus a persistent NuGet cache on GitHub Packages
      # so heavy ports (grpc, opencv) are built once and survive eviction.
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          # Cache key depends on OS, compiler, and the vcpkg.json file
          key: vcpkg-${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-${{ matrix.cc }}-

      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.os == 'macos-latest'
        with:
          xcode-version: latest-stable

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install Build Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y autoconf autoconf-archive automake libtool libxrandr-dev \
            libx11-dev libxft-dev libxext-dev libltdl-dev libxi-dev libxtst-dev \
            x11-xserver-utils gi-docgen nasm mono-complete

      - name: Install mono (macOS, for the NuGet binary cache)
        if: runner.os == 'macOS'
        run: brew install mono

      - name: Set up vcpkg NuGet binary cache (GitHub Packages)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            VCPKG_EXE="$VCPKG_ROOT/vcpkg.exe"; MONO=""
          else
            VCPKG_EXE="$VCPKG_ROOT/vcpkg"; MONO="mono"
          fi
          FEED="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          NUGET="$("$VCPKG_EXE" fetch nuget | tail -n1)"
          # Tolerate failures (e.g. fork PRs whose GITHUB_TOKEN cannot write to
          # GitHub Packages) — the local files cache still works.
          $MONO "$NUGET" sources add -Source "$FEED" -StorePasswordInClearText \
            -Name GitHubPackages -UserName "${{ github.repository_owner }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}" || true
          $MONO "$NUGET" setapikey "${{ secrets.GITHUB_TOKEN }}" -Source "$FEED" || true

      - name: Configure CMake
        shell: bash
        env:
          CC: ${{ matrix.real_cc }}
          CXX: ${{ matrix.real_cxx }}
        run: |
          # Use different path syntax for Windows toolchain if needed
          VCPKG_PATH="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

          # Skip the heavy OpenCV/ffmpeg backend on PRs for fast feedback; build
          # the full feature set on pushes to master. The image-processing code
          # already guards OpenCV (if(OpenCV_FOUND) / IMAGEPROC_HAVE_OPENCV).
          FEATURES="image;database;luamodules;testing;backtrace;web"
          if [ "${{ github.event_name }}" = "push" ]; then
            FEATURES="image-opencv;$FEATURES"
          fi

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_PATH" \
            -DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON \
            -DVCPKG_MANIFEST_FEATURES="$FEATURES" \
            -DTGBOTCPP_BUILD_TESTS=ON \
            ${{ matrix.flags }}

      - name: Build project
        run: |
          cmake --build build --config Release
          cmake --build build --config Release --target optional_all

      - name: Run Tests
        shell: bash
        run: |
          cd build
          ctest -C Release --output-on-failure --timeout 60

      - name: Package (CPack smoke test)
        shell: bash
        working-directory: build
        run: cpack -C Release

      - name: Upload packages
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: glider-${{ matrix.os }}-${{ matrix.cc }}-${{ strategy.job-index }}
          path: |
            build/Glider-*.zip
            build/Glider-*.tar.gz
            build/Glider-*.exe
            build/Glider-*.deb
          if-no-files-found: ignore
